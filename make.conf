#Compiler flags,
COMMON_FLAGS="-march=native -O3 -pipe -flto=thin"
#Video cards,
VIDEO_CARDS="nvidia intel"
#Input devices,
INPUT_DEVICES="libinput"
#Directories,
CONFIG_PROTECT="/var/bind"
PORTAGE_TMPDIR="/var/tmp"
DISTDIR="/var/gentoo/distfiles"
#Locale,
LINGUAS="en_US"
L10N="en en-US"
LC_MESSAGES=C.utf8
#Portage instructions,
EMERGE_DEFAULT_OPTS="--ask --verbose --keep-going --with-bdeps=y --complete-graph=y"
MAKEOPTS="-j18"
FEATURES="parallel-install candy compressdebug compress-index nostrip parallel-fetch fixlafiles unmerge-orphans noinfo notitles clean-logs"
#Compression,
#CPU,
CPU_FLAGS_X86="aes avx avx2 avx_vnni bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 ssse3 vpclmulqdq"
#Flags inheriting COMMON_FLAGS,
CFLAGS="${COMMON_FLAGS}"
LDFLAGS="${LDFLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
#License,
ACCEPT_LICENSE="*"
#Global USE flags,
USE="X xinerama dist-kernel pipewire pulseaudio lto jit nvenc elogind threads vdpau -bluetooth -cups -gnome -gnome-keyring -gtk -gtk2 -gtk3 -gtk4 -kde -qt5 -qt6 -systemd -telemetry -wayland -webengine"

#Rolling release,
ACCEPT_KEYWORDS="~amd64"
#Grub,
GRUB_PLATFORMS="efi-64"
