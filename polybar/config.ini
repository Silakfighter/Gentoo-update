[bar/mybar]
modules-left = bspwm
modules-right = filesystem emerge wlan battery volume ram cpu date spacer
modules-center = spotify
font-0 = JetBrains Mono:size=10;2
font-1 = Symbols Nerd Font:size=10;2
font-2 = Symbols Nerd Font Mono:size=10;2
override-redirect = false
height = 26
background = #2e3440

[colors]
background = #2e3440
foreground = #d8dee9
primary = #88c0d0
secondary = #81a1c1
powermenu-color = #f5c2e7
spotify-color = #89b4fa
volume-color = #bdb2ff
cpu-color = #fab387
emerge-color = #f9e2af
syslog-color = #94e2d5
date-color = #56b6c2
lan-color = #cdd6f4
wlan-color = #f5e0dc
filesystem-color = #f2cdcd
color-charging = #FFA500
color-discharging = #FFD700

[module/date]
type = internal/date
date = %d-%h %H:%M
label-padding = 2
format-foreground = ${colors.date-color}


[module/cpu]
type = internal/cpu
format = <label> <ramp-coreload>
label = CPU %percentage%%
label-padding = 2
ramp-coreload-spacing = 0.5
ramp-coreload-0 = %{F#a6e3a1}▁%{F-}
ramp-coreload-1 = %{F#a6e3a1}▂%{F-}
ramp-coreload-2 = %{F#a6e3a1}▃%{F-}
ramp-coreload-3 = %{F#a6e3a1}▄%{F-}
ramp-coreload-4 = %{F#fab387}▅%{F-}
ramp-coreload-5 = %{F#fab387}▆%{F-}
ramp-coreload-6 = %{F#f38ba8}▇%{F-}
ramp-coreload-7 = %{F#f38ba8}█%{F-}
format-foreground = ${colors.cpu-color}
interval = 5

[module/bspwm]
type = internal/bspwm
label-focused = " %name%"
label-focused-padding = 2
label-occupied = " %name%"
label-occupied-padding = 2
label-empty = " %name%"
label-empty-padding = 2

[module/volume]
type = custom/script
exec = ~/.config/polybar/volume.sh
interval = 5
label = %output%
format-foreground = ${colors.volume-color}

[module/syslog]
type = custom/script
exec = ~/.config/polybar/scripts/syslog-tail.sh
interval = 15
label = %output%
label-padding = 1
format = <label>
format-foreground = ${colors.syslog-color}

[module/emerge]
type = custom/script
exec = ~/.config/polybar/scripts/emerge-status.sh
interval = 10
tail = false
format-padding = 1
format-foreground = ${colors.emerge-color}

[module/powermenu]
type = custom/script
exec = echo ""
click-left = ~/.config/polybar/scripts/powermenu.sh
format-foreground = ${colors.powermenu-color}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
label-charging = %{F#FFA500}%percentage%%%{F-}
label-discharging = %{F#FFD700}%percentage%%%{F-}
label-full = %{F#00FF00}100%%{F-}

[module/wlan]
type = custom/script
interval = 10
exec = sh -c 'SSID=$(iw dev wlo1 link | grep SSID | cut -d " " -f2-); if [ -n "$SSID" ]; then echo " $SSID"; else echo "%{F#ff5555} offline%{F-}"; fi'
format-padding = 1

[module/ram]
type = custom/script
interval = 10
exec = sh -c 'u=$(free | awk "/Mem:/ {printf(\"%.0f\", \$3/\$2 * 100)}"); if [ "$u" -lt 80 ]; then echo "RAM %{F#50fa7b} ${u}%%{F-}"; else echo "RAM %{F#ff5555} ${u}%%{F-}"; fi'
format-padding = 1

